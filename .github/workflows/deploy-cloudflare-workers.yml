name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build (Cloudflare target)
        env:
          BUILD_TARGET: cloudflare
        run: npm run build

      - name: Wrangler diagnostics (shows real failure)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          echo "Node: $(node -v)"
          echo "NPM:  $(npm -v)"
          npx --yes wrangler@3 --version
          # This will fail with a clear message if the token is missing/invalid
          npx --yes wrangler@3 whoami

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --verbose

