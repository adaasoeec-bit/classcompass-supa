name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build (Cloudflare target)
        env:
          BUILD_TARGET: cloudflare
        run: npm run build

      - name: Wrangler diagnostics (shows real failure)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          echo "Node: $(node -v)"
          echo "NPM:  $(npm -v)"
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "CLOUDFLARE_API_TOKEN: (missing)"
          else
            echo "CLOUDFLARE_API_TOKEN: (present, length=${#CLOUDFLARE_API_TOKEN})"
          fi
          npx --yes wrangler@4 --version
          echo "Running wrangler whoami (expect success)..."
          set +e
          WHOAMI_OUT="$(npx --yes wrangler@4 whoami 2>&1)"
          WHOAMI_CODE=$?
          set -e
          echo "$WHOAMI_OUT"
          echo "wrangler whoami exit_code=$WHOAMI_CODE"
          if [ "$WHOAMI_CODE" -ne 0 ]; then
            echo "Wrangler auth failed. This is almost always an invalid token or insufficient token scopes."
            exit "$WHOAMI_CODE"
          fi

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy --verbose

